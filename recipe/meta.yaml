{% set name = "repro-tarfile" %}
{% set version = "0.2.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/repro_tarfile-{{ version }}.tar.gz
  sha256: 4270205de0f1411fdd332f77156124c1dfe04d922ea1ba399fb50dd370cd04f3

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - hatchling
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - repro_tarfile
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  summary: A tiny, zero-dependency replacement for Python's tarfile standard library for creating reproducible/deterministic tar archives.
  home: https://github.com/drivendataorg/repro-tarfile
  dev_url: https://github.com/drivendataorg/repro-tarfile
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jayqi
